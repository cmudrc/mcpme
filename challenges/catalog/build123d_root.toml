id = "build123d_root"
title = "build123d root oneshot"
tier = "local_full"
style = "package"
slice = "manufacturing"

[target]
kind = "package"
value = "build123d"

[probe]
imports = ["build123d"]

[scaffold]
kind = "package"
include_submodules = true
module_include_patterns = ["^build123d\\.importers$"]
symbol_include_patterns = ["^import_stl$"]
max_generated_tools = 8

[smoke]
[[smoke.steps]]
tool = "importers__import_stl"
arguments = { file_name = "{challenge_fixture_dir}/tri.stl" }

[smoke.steps.expect]
text_contains = ["Face"]
