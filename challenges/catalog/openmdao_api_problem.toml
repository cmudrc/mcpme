id = "openmdao_api_problem"
title = "OpenMDAO Problem root oneshot"
tier = "local_full"
style = "package"
slice = "systems"

[target]
kind = "package"
value = "openmdao.api"

[probe]
imports = ["openmdao.api"]

[scaffold]
kind = "package"
symbol_include_patterns = ["^Problem$"]
max_generated_tools = 40

[smoke]
[[smoke.steps]]
tool = "create_problem"
arguments = { args = [], kwargs = {} }
capture_json = { problem_session_id = "session_id" }

[[smoke.steps]]
tool = "problem_setup"
arguments = { session_id = "{problem_session_id}", check = false }

[[smoke.steps]]
tool = "close_problem"
arguments = { session_id = "{problem_session_id}" }
