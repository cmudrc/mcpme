[tool.mcpwrap]
artifact_mode = "summary"

[[tool.mcpwrap.subprocess]]
name = "legacy_solver"
description = "Run a deterministic file-driven legacy solver."
argv = [
  "sh",
  "-c",
  "exec sh \"$MCPWRAP_EXAMPLE_SOURCE_ROOT/commands/run_legacy_solver.sh\""
]
result_kind = "file_json"
result_path = "result.json"

[tool.mcpwrap.subprocess.input_schema]
type = "object"
required = ["case_name", "velocity", "area"]

[tool.mcpwrap.subprocess.input_schema.properties.case_name]
type = "string"

[tool.mcpwrap.subprocess.input_schema.properties.velocity]
type = "number"

[tool.mcpwrap.subprocess.input_schema.properties.area]
type = "number"

[[tool.mcpwrap.subprocess.files]]
path = "deck.json"
template = "{{\"case_name\": \"{case_name}\", \"velocity\": {velocity}, \"area\": {area}}}"

[[tool.mcpwrap.subprocess.outputs]]
path = "reports"
kind = "directory"
when = "success"
